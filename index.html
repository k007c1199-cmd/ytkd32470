<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語練習ゲーム | ランキング付き</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e2b3c, #0f1a24);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* メインカード */
        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
        }

        /* 左: ゲームエリア */
        .game-area {
            flex: 2;
            min-width: 300px;
            background: #fef9ef;
            border-radius: 48px;
            padding: 30px 25px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            transition: 0.2s;
        }

        /* 右: ランキング＆履歴 */
        .info-area {
            flex: 1.2;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .rank-panel, .history-panel {
            background: #1e2a32e6;
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 20px;
            color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .rank-panel h3, .history-panel h3 {
            margin: 0 0 15px 0;
            font-size: 1.6rem;
            border-left: 6px solid #f7b32b;
            padding-left: 16px;
        }

        /* 問題カード */
        .question-card {
            text-align: center;
        }

        .japanese-word {
            background: #2c3e4e;
            color: #f9e6cf;
            font-size: 3rem;
            font-weight: bold;
            padding: 35px 20px;
            border-radius: 60px;
            margin-bottom: 25px;
            box-shadow: inset 0 -2px 0 #1e2a32, 0 12px 18px rgba(0,0,0,0.1);
            word-break: break-word;
        }

        .english-input-area {
            margin: 20px 0;
        }

        .english-input-area label {
            font-weight: 600;
            display: block;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: #2c3e4e;
        }

        #answerInput {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.4rem;
            border: 3px solid #d4c9b0;
            border-radius: 60px;
            text-align: center;
            background: white;
            font-weight: 500;
            transition: 0.1s;
            outline: none;
        }

        #answerInput:focus {
            border-color: #f7b32b;
            box-shadow: 0 0 0 3px #f7b32b55;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0 15px;
        }

        button {
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s ease;
            background: #e9e3d5;
            color: #1e2b3c;
        }

        .btn-primary {
            background: #f7b32b;
            color: #2c3e4e;
            box-shadow: 0 4px 0 #b4621a;
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b4621a;
        }

        .btn-reset {
            background: #b0a694;
            color: #1e2b3c;
        }

        .feedback {
            font-size: 1.2rem;
            text-align: center;
            padding: 12px;
            border-radius: 32px;
            margin: 15px 0;
            font-weight: bold;
        }

        .feedback.correct {
            background: #a5d6a5;
            color: #1e4a1e;
        }

        .feedback.wrong {
            background: #f4acb7;
            color: #8b2c2c;
        }

        .progress {
            background: #ddd3c0;
            border-radius: 40px;
            padding: 8px 18px;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        /* ランキングテーブル */
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            color: #f0f0f0;
        }

        .rank-table th, .rank-table td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid #3e4f5e;
        }

        .rank-table th {
            background: #00000055;
            font-weight: bold;
        }

        .history-list {
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            background: #2c3e4eaa;
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            gap: 8px;
            flex-wrap: wrap;
        }

        .correct-badge {
            color: #a3e4a3;
            font-weight: bold;
        }

        .wrong-badge {
            color: #f7a1a1;
        }

        .current-score-badge {
            background: #f7b32b;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 80px;
            font-weight: bold;
            color: #1e2b3c;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 15px;
            opacity: 0.7;
        }

        @media (max-width: 800px) {
            .japanese-word { font-size: 2rem; }
            #answerInput { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- 左: メインゲーム -->
    <div class="game-area">
        <div class="question-card">
            <div class="japanese-word" id="japaneseQuestion">りんご</div>
            <div class="english-input-area">

                <input type="text" id="answerInput" placeholder="例: apple" autocomplete="off">
            </div>
            <div class="action-buttons">
                <button class="btn-primary" id="submitBtn">✅ 判定 & 次へ</button>
                <button class="btn-reset" id="resetGameBtn">🔄 ゲーム終了 & リセット</button>
            </div>
            <div class="feedback" id="feedbackMsg"></div>
            <div class="progress">
                📋 進捗: <span id="currentQIndex">1</span> / <span id="totalQuestions">10</span> &nbsp;|&nbsp;
                🎯 正解数: <span id="currentScore">0</span>
            </div>
        </div>
        <footer>※ 正解/不正解を選ぶと自動で次の問題へ。最後にランキング登録されます。</footer>
    </div>

    <!-- 右: ランキング＋履歴 -->
    <div class="info-area">
        <div class="rank-panel">
            <h3>🏆 ランキング (正解数順)</h3>

        <div class="history-panel">

        </div>
    </div>
</div>

    // ゲーム設定
    const TOTAL_QUESTIONS = 20;      // 毎回ランダムで10問出題

    // 状態変数
    let currentQuestions = [];        // 今回出題する問題配列 {jp, en}
    let currentIndex = 0;            // 現在何問目か (0スタート)
    let score = 0;                   // 正解数
    let sessionHistory = [];          // 今回の履歴 [{jp, yourAnswer, correct, correctEn}]
    let gameActive = true;            // ゲーム進行中か (判定後自動次へ)
    let waitingForNext = false;       // 判定後すぐ連打防止フラグ

    // ランキングデータ (localStorage保存)
    let rankings = [];                // { playerName, correctCount, totalQuestions, date }

    // DOM要素
    const japaneseQuestionEl = document.getElementById("japaneseQuestion");
    const answerInput = document.getElementById("answerInput");
    const submitBtn = document.getElementById("submitBtn");
    const resetGameBtn = document.getElementById("resetGameBtn");
    const feedbackMsgDiv = document.getElementById("feedbackMsg");
    const currentQIndexSpan = document.getElementById("currentQIndex");
    const totalQuestionsSpan = document.getElementById("totalQuestions");
    const currentScoreSpan = document.getElementById("currentScore");
    const sessionHistoryDiv = document.getElementById("sessionHistory");
    const rankBody = document.getElementById("rankBody");

    // --------------------- ランキング読み書き -------------------------
    function loadRankings() {
        const stored = localStorage.getItem("englishVocabRankings");
        if (stored) {
            rankings = JSON.parse(stored);
        } else {
            // サンプルランキング
            rankings = [
                { playerName: "たろう", correctCount: 9, totalQuestions: 10, date: "2025-02-10" },
                { playerName: "はなこ", correctCount: 8, totalQuestions: 10, date: "2025-02-09" }
            ];
            saveRankings();
        }
        renderRanking();
    }

    function saveRankings() {
        localStorage.setItem("englishVocabRankings", JSON.stringify(rankings));
    }

    // ランキング表示 (正解数順 + 同点なら日付新しい順)
    function renderRanking() {
        if (!rankBody) return;
        if (rankings.length === 0) {
            rankBody.innerHTML = '<tr><td colspan="4">ランキングがありません</td></tr>';
            return;
        }
        const sorted = [...rankings].sort((a,b) => {
            if (a.correctCount !== b.correctCount) return b.correctCount - a.correctCount;
            else return new Date(b.date) - new Date(a.date);
        });
        rankBody.innerHTML = "";
        for (let i = 0; i < sorted.length; i++) {
            const r = sorted[i];
            const accuracy = Math.round((r.correctCount / r.totalQuestions) * 100);
            const row = `<tr>
                <td>${i+1}</td>
                <td>${escapeHtml(r.playerName)}</td>
                <td>${r.correctCount} / ${r.totalQuestions}</td>
                <td>${accuracy}%</td>
            </tr>`;
            rankBody.insertAdjacentHTML('beforeend', row);
        }
    }

    // ランキング追加（ゲーム終了時またはリセット時に呼ぶ）
    function addRanking(playerName, correctCount, total) {
        const newEntry = {
            playerName: playerName.slice(0, 20),
            correctCount: correctCount,
            totalQuestions: total,
            date: new Date().toISOString().slice(0,10)
        };
        rankings.push(newEntry);
        // 最大30件保持
        if (rankings.length > 30) rankings.shift();
        saveRankings();
        renderRanking();
    }

    // 簡単なXSS対策
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // --------------------- ゲームコア -------------------------
    // ランダムに指定数だけ単語をピックアップ (重複なし)
    function pickRandomQuestions(count) {
        const shuffled = [...WORD_SET];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    // セッション履歴の表示更新
    function renderSessionHistory() {
        if (!sessionHistoryDiv) return;
        if (sessionHistory.length === 0) {
            sessionHistoryDiv.innerHTML = "まだ問題を解いていません";
            return;
        }
        let html = "";
        sessionHistory.forEach((item, idx) => {
            const statusClass = item.correct ? "correct-badge" : "wrong-badge";
            const statusText = item.correct ? "✓ 正解" : "✗ 不正解";
            html += `<div class="history-item">
                        <span>${idx+1}. ${item.jp} → ${item.yourAnswer || "(未入力)"}</span>
                        <span class="${statusClass}">${statusText}</span>
                        <span style="font-size:0.7rem;">正解: ${item.correctEn}</span>
                    </div>`;
        });
        sessionHistoryDiv.innerHTML = html;
    }

    // UI更新: 問題表示、進捗表示、スコア表示
    function updateUI() {
        if (!gameActive) return;
        const q = currentQuestions[currentIndex];
        if (q) {
            japaneseQuestionEl.textContent = q.jp;
        } else {
            japaneseQuestionEl.textContent = "----";
        }
        currentQIndexSpan.textContent = currentIndex + 1;
        totalQuestionsSpan.textContent = TOTAL_QUESTIONS;
        currentScoreSpan.textContent = score;
        answerInput.value = "";
        answerInput.focus();
    }

    // ゲーム終了処理 (ランキング登録してリセット or 終了)
    function finishGameAndReset(askName = true) {
        if (!gameActive && waitingForNext) return;
        // ゲーム終了状態
        gameActive = false;
        if (askName) {
            const playerName = prompt(`✨ ゲーム終了！ あなたの正解数: ${score}/${TOTAL_QUESTIONS}\n名前を入力してランキングに登録してください。`, "挑戦者");
            if (playerName && playerName.trim() !== "") {
                addRanking(playerName.trim(), score, TOTAL_QUESTIONS);
                feedbackMsgDiv.innerHTML = `🎉 ランキング登録完了！ ゲームをリセットします 🎉`;
            } else {
                feedbackMsgDiv.innerHTML = `ランキング登録せずにリセットします。`;
            }
        } else {
            feedbackMsgDiv.innerHTML = `ゲームをリセットします。`;
        }
        // 完全リセット
        resetGameInternal();
    }

    // 内部リセット（新しいゲーム開始）
    function resetGameInternal() {
        // 新しい問題セット
        currentQuestions = pickRandomQuestions(TOTAL_QUESTIONS);
        currentIndex = 0;
        score = 0;
        sessionHistory = [];
        gameActive = true;
        waitingForNext = false;
        renderSessionHistory();
        updateUI();
        feedbackMsgDiv.innerHTML = "✨ 新しいゲームを開始しました！ 頑張ってください ✨";
        feedbackMsgDiv.className = "feedback";
    }

    // 現在の問題を判定
    function judgeAndNext() {
        if (!gameActive) {
            feedbackMsgDiv.innerHTML = "ゲームは終了しています。「ゲーム終了＆リセット」で新しく始めてね";
            feedbackMsgDiv.className = "feedback wrong";
            return;
        }
        if (waitingForNext) {
            feedbackMsgDiv.innerHTML = "処理中です。少し待ってください";
            return;
        }
        if (currentIndex >= TOTAL_QUESTIONS) {
            // 全問終了したら自動で終了＆ランキング
            finishGameAndReset(true);
            return;
        }

        const currentQ = currentQuestions[currentIndex];
        const userAnswer = answerInput.value.trim().toLowerCase();
        const correctAnswer = currentQ.en.toLowerCase();
        let isCorrect = (userAnswer === correctAnswer);
        
        // 記録を保存
        if (isCorrect) {
            score++;
            currentScoreSpan.textContent = score;
            feedbackMsgDiv.innerHTML = `✅ 正解！ 「${currentQ.en}」 です！ +1点`;
            feedbackMsgDiv.className = "feedback correct";
        } else {
            feedbackMsgDiv.innerHTML = `❌ 不正解... 正解は "${currentQ.en}" でした。 次に進みます。`;
            feedbackMsgDiv.className = "feedback wrong";
        }
        
        // 履歴追加
        sessionHistory.push({
            jp: currentQ.jp,
            yourAnswer: answerInput.value.trim() || "(空欄)",
            correct: isCorrect,
            correctEn: currentQ.en
        });
        renderSessionHistory();
        
        // 次の問題へ
        currentIndex++;
        
        // 全ての問題が終わったかチェック
        if (currentIndex >= TOTAL_QUESTIONS) {
            // ゲームクリア → ランキング登録へ
            updateUI(); // 最終進捗表示
            waitingForNext = true; // 連打防止
            setTimeout(() => {
                finishGameAndReset(true);
                waitingForNext = false;
            }, 400);
            return;
        }
        
        // まだ続く場合: 次の問題を表示
        updateUI();
        
        // アニメーション処理のため、waitingForNextはすぐ解除（ただし連打防止は少し間を空ける）
        waitingForNext = true;
        setTimeout(() => {
            waitingForNext = false;
        }, 300);
    }

    // リセットボタン処理（ゲーム中断＋ランキング登録するか確認）
    function handleResetButton() {
        if (!gameActive) {
            resetGameInternal();
            return;
        }
        const confirmReset = confirm("現在のゲームを中断し、ここまでの結果をランキングに登録しますか？\n「OK」→ 登録してリセット / 「キャンセル」→ 登録せずにリセット");
        if (confirmReset) {
            // ランキング登録してリセット
            const name = prompt(`途中経過: 正解数 ${score}/${currentIndex} 問中。名前を入力してください`, "途中参加者");
            if (name && name.trim()) {
                addRanking(name.trim(), score, TOTAL_QUESTIONS);
                feedbackMsgDiv.innerHTML = "中断スコアをランキングに登録しました。新しく始めます。";
            } else {
                feedbackMsgDiv.innerHTML = "登録せずにリセットします。";
            }
        } else {
            feedbackMsgDiv.innerHTML = "ランキング登録なしでリセットします。";
        }
        resetGameInternal();
    }

    // 初期化 & イベント登録
    function initGame() {
        loadRankings();
        currentQuestions = pickRandomQuestions(TOTAL_QUESTIONS);
        currentIndex = 0;
        score = 0;
        sessionHistory = [];
        gameActive = true;
        waitingForNext = false;
        updateUI();
        renderSessionHistory();
        feedbackMsgDiv.innerHTML = "🎓 英単語ゲームスタート！ 正解を入力して「判定＆次へ」";
        feedbackMsgDiv.className = "feedback";
        
        submitBtn.addEventListener("click", judgeAndNext);
        resetGameBtn.addEventListener("click", handleResetButton);
        answerInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                judgeAndNext();
            }
        });
    }

    initGame();
</script>
</body>
</html>
